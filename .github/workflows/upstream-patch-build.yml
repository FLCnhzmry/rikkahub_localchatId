name: Upstream Patch Build

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream release tag to patch. Leave empty to use the latest release."
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub release on success."
        required: false
        default: true
        type: boolean
      force_rebuild:
        description: "Force rebuild even if the patched release tag already exists."
        required: false
        default: false
        type: boolean
      source_mode:
        description: "Choose whether to build from the upstream release tag or the current master branch."
        required: false
        default: tag
        type: choice
        options:
          - tag
          - master
          - ref
      upstream_ref:
        description: "Custom upstream branch, tag ref, or commit SHA to build when source_mode=ref."
        required: false
        type: string
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  patch-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Resolve upstream release tag
        id: resolve
        shell: pwsh
        run: |
          ./scripts/resolve-upstream-tag.ps1 `
            -RequestedTag "${{ github.event.inputs.upstream_tag }}" `
            -SourceMode "${{ github.event.inputs.source_mode || 'tag' }}" `
            -RequestedRef "${{ github.event.inputs.upstream_ref }}" `
            -GitHubOutputPath $env:GITHUB_OUTPUT

      - name: Apply local patches to upstream release
        id: apply
        shell: pwsh
        run: |
          ./scripts/apply-upstream-patches.ps1 `
            -UpstreamRef "${{ steps.resolve.outputs.checkout_ref }}" `
            -SourceLabel "${{ steps.resolve.outputs.resolved_target }}" `
            -WorkDir ".release-worktree" `
            -PatchDir "patches" `
            -LogDir ".release-logs"

      - name: Read patched app version
        id: app_version
        if: success()
        shell: pwsh
        run: |
          $expectedVersion = ""
          if ("${{ steps.resolve.outputs.source_mode }}" -eq "tag") {
            $expectedVersion = "${{ steps.resolve.outputs.normalized_upstream_version }}"
          }

          ./scripts/read-android-version.ps1 `
            -ProjectDir ".release-worktree" `
            -ExpectedVersionName $expectedVersion `
            -GitHubOutputPath $env:GITHUB_OUTPUT

      - name: Read source metadata
        id: source_meta
        if: success()
        shell: pwsh
        run: |
          $metadataPath = ".release-logs/metadata.json"
          if (-not (Test-Path $metadataPath)) {
            throw "Metadata file '$metadataPath' does not exist."
          }

          $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
          if ([string]::IsNullOrWhiteSpace($metadata.upstream_commit)) {
            throw "Metadata file '$metadataPath' is missing upstream_commit."
          }

          if ([string]::IsNullOrWhiteSpace($metadata.upstream_commit_date)) {
            throw "Metadata file '$metadataPath' is missing upstream_commit_date."
          }

          "upstream_commit=$($metadata.upstream_commit)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "upstream_commit_date=$($metadata.upstream_commit_date)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Finalize release metadata
        id: release_meta
        if: success()
        shell: pwsh
        run: |
          $versionName = "${{ steps.app_version.outputs.app_version_name }}"
          "release_tag=patched-$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=rikkahub-patched-$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "source_metadata_asset_name=source-metadata-$versionName.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check resolved app version release
        id: release_check_after_version
        if: success()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $forceRebuild = "${{ github.event.inputs.force_rebuild }}"
          if ($forceRebuild -eq "true") {
            Write-Host "force_rebuild=true, skipping resolved version release check."
            "should_skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          $currentSourceCommit = "${{ steps.source_meta.outputs.upstream_commit }}"
          $currentSourceCommitDate = "${{ steps.source_meta.outputs.upstream_commit_date }}"
          $metadataAssetName = "${{ steps.release_meta.outputs.source_metadata_asset_name }}"

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releaseTag = "${{ steps.release_meta.outputs.release_tag }}"
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$releaseTag"

          try {
            $release = Invoke-RestMethod -Uri $uri -Headers $headers
            $shouldSkip = $true
            $baselineDate = $null
            $baselineSource = "release published_at"

            $metadataAsset = $release.assets | Where-Object { $_.name -eq $metadataAssetName } | Select-Object -First 1
            if ($null -ne $metadataAsset) {
              Write-Host "Found source metadata asset '$metadataAssetName' on existing release."

              $assetHeaders = @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                Accept = "application/octet-stream"
                "X-GitHub-Api-Version" = "2022-11-28"
              }
              $tempMetadataPath = Join-Path $env:RUNNER_TEMP $metadataAssetName
              Invoke-WebRequest -Uri $metadataAsset.url -Headers $assetHeaders -OutFile $tempMetadataPath
              $storedMetadata = Get-Content -LiteralPath $tempMetadataPath -Raw | ConvertFrom-Json

              if ($storedMetadata.upstream_commit -eq $currentSourceCommit) {
                Write-Host "Patched release '$releaseTag' already points to upstream commit '$currentSourceCommit'; skipping build."
                "should_skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                exit 0
              }

              if (-not [string]::IsNullOrWhiteSpace($storedMetadata.upstream_commit_date)) {
                $baselineDate = [datetimeoffset]::Parse($storedMetadata.upstream_commit_date)
                $baselineSource = "stored upstream_commit_date"
              }
            }

            if ($null -eq $baselineDate -and -not [string]::IsNullOrWhiteSpace($release.published_at)) {
              $baselineDate = [datetimeoffset]::Parse($release.published_at)
            }

            if ($null -eq $baselineDate) {
              Write-Host "Patched release '$releaseTag' exists but no comparable timestamp was found; skipping build."
            } else {
              $currentDate = [datetimeoffset]::Parse($currentSourceCommitDate)
              if ($currentDate -gt $baselineDate) {
                Write-Host "Current upstream source is newer than $baselineSource for '$releaseTag'; rebuilding release."
                $shouldSkip = $false
              } else {
                Write-Host "Current upstream source is not newer than $baselineSource for '$releaseTag'; skipping build."
              }
            }

            "should_skip=$($shouldSkip.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }

            if ($statusCode -eq 404) {
              Write-Host "Patched release '$releaseTag' does not exist yet."
              "should_skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            } else {
              throw
            }
          }

      - name: Create source metadata asset
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".release-artifacts/metadata" | Out-Null

          $metadata = [ordered]@{
            version_name = "${{ steps.app_version.outputs.app_version_name }}"
            version_code = "${{ steps.app_version.outputs.app_version_code }}"
            source_mode = "${{ steps.resolve.outputs.source_mode }}"
            resolved_target = "${{ steps.resolve.outputs.resolved_target }}"
            upstream_tag = "${{ steps.resolve.outputs.upstream_tag }}"
            upstream_commit = "${{ steps.source_meta.outputs.upstream_commit }}"
            upstream_commit_date = "${{ steps.source_meta.outputs.upstream_commit_date }}"
            generated_at = "${{ github.run_id }}:${{ github.run_attempt }}"
          }

          $metadata | ConvertTo-Json | Set-Content -LiteralPath ".release-artifacts/metadata/${{ steps.release_meta.outputs.source_metadata_asset_name }}" -Encoding utf8

      - name: Prepare build files
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        shell: bash
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Copy signing files into patched worktree
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "local.properties" -Destination ".release-worktree/local.properties" -Force
          Copy-Item -LiteralPath "app/google-services.json" -Destination ".release-worktree/app/google-services.json" -Force
          Copy-Item -LiteralPath "app/app.key" -Destination ".release-worktree/app/app.key" -Force

          $localPropertiesPath = ".release-worktree/local.properties"
          $content = Get-Content -LiteralPath $localPropertiesPath -Raw
          $content = $content -replace '(?m)^storeFile\s*=\s*app[\\/]+app\.key\s*$', 'storeFile=app.key'
          Set-Content -LiteralPath $localPropertiesPath -Value $content -Encoding utf8

      - name: Build patched release
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          ./scripts/build-release.ps1 `
            -ProjectDir ".release-worktree" `
            -LogDir ".release-logs" `
            -GradleTask "assembleRelease"

      - name: Collect APK artifacts
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".release-artifacts" | Out-Null
          Copy-Item -LiteralPath ".release-worktree/app/build/outputs/apk/release" -Destination ".release-artifacts/apk" -Recurse -Force

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-build-logs-${{ steps.resolve.outputs.resolved_target }}
          path: .release-logs
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload APKs
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.artifact_name }}
          path: .release-artifacts/apk/**/*.apk
          if-no-files-found: error

      - name: Publish patched release
        if: success() && steps.release_check_after_version.outputs.should_skip != 'true' && github.event.inputs.publish_release != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: Patched ${{ steps.app_version.outputs.app_version_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            .release-artifacts/apk/**/*.apk
            .release-artifacts/metadata/${{ steps.release_meta.outputs.source_metadata_asset_name }}
