name: Upstream Patch Build

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream release tag to patch. Leave empty to use the latest release."
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub release on success."
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  patch-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve upstream release tag
        id: resolve
        shell: pwsh
        run: |
          ./scripts/resolve-upstream-tag.ps1 `
            -RequestedTag "${{ github.event.inputs.upstream_tag }}" `
            -GitHubOutputPath $env:GITHUB_OUTPUT

      - name: Check for existing patched release
        id: release_check
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releaseTag = "${{ steps.resolve.outputs.release_tag }}"
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$releaseTag"

          try {
            $release = Invoke-RestMethod -Uri $uri -Headers $headers
            Write-Host "Patched release '$releaseTag' already exists (id=$($release.id)); skipping build."
            "should_skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }

            if ($statusCode -eq 404) {
              Write-Host "Patched release '$releaseTag' does not exist yet."
              "should_skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            } else {
              throw
            }
          }

      - name: Prepare build files
        if: steps.release_check.outputs.should_skip != 'true'
        shell: bash
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Apply local patches to upstream release
        id: apply
        if: steps.release_check.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          ./scripts/apply-upstream-patches.ps1 `
            -UpstreamTag "${{ steps.resolve.outputs.upstream_tag }}" `
            -WorkDir ".release-worktree" `
            -PatchDir "patches" `
            -LogDir ".release-logs"

      - name: Read patched app version
        id: app_version
        if: success() && steps.release_check.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          ./scripts/read-android-version.ps1 `
            -ProjectDir ".release-worktree" `
            -ExpectedVersionName "${{ steps.resolve.outputs.normalized_upstream_version }}" `
            -GitHubOutputPath $env:GITHUB_OUTPUT

      - name: Copy signing files into patched worktree
        if: success() && steps.release_check.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "local.properties" -Destination ".release-worktree/local.properties" -Force
          Copy-Item -LiteralPath "app/google-services.json" -Destination ".release-worktree/app/google-services.json" -Force
          Copy-Item -LiteralPath "app/app.key" -Destination ".release-worktree/app/app.key" -Force

          $localPropertiesPath = ".release-worktree/local.properties"
          $content = Get-Content -LiteralPath $localPropertiesPath -Raw
          $content = $content -replace '(?m)^storeFile\s*=\s*app[\\/]+app\.key\s*$', 'storeFile=app.key'
          Set-Content -LiteralPath $localPropertiesPath -Value $content -Encoding utf8

      - name: Build patched release
        if: success() && steps.release_check.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          ./scripts/build-release.ps1 `
            -ProjectDir ".release-worktree" `
            -LogDir ".release-logs" `
            -GradleTask "assembleRelease"

      - name: Collect APK artifacts
        if: success() && steps.release_check.outputs.should_skip != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".release-artifacts" | Out-Null
          Copy-Item -LiteralPath ".release-worktree/app/build/outputs/apk/release" -Destination ".release-artifacts/apk" -Recurse -Force

      - name: Upload logs
        if: always() && steps.release_check.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: patch-build-logs-${{ steps.resolve.outputs.upstream_tag }}
          path: .release-logs
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload APKs
        if: success() && steps.release_check.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          path: .release-artifacts/apk/**/*.apk
          if-no-files-found: error

      - name: Publish patched release
        if: success() && steps.release_check.outputs.should_skip != 'true' && github.event.inputs.publish_release != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: Patched ${{ steps.app_version.outputs.app_version_name }}
          generate_release_notes: true
          files: .release-artifacts/apk/**/*.apk
